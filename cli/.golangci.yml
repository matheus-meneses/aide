version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - depguard
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace
    # ratchet later:
    # - cyclop
    # - funlen
    # - wrapcheck
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "Deprecated: use io and os packages"
    gosec:
      excludes:
        - G404
        - G202
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      enable-all-rules: false
      rules:
        - name: unused-parameter
        - name: early-return
        - name: empty-block
        - name: unreachable-code
        - name: unnecessary-stmt
    staticcheck:
      checks:
        - all
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - unparam
          - bodyclose
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules

version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - depguard
    - forbidigo
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nolintlint
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace
    # ratchet later:
    # - cyclop
    # - funlen
    # - wrapcheck
  settings:
    forbidigo:
      # Block raw stdout writes: CLI output must go through internal/ui/widgets
      # (routed, color/quiet aware, testable) and diagnostics through
      # internal/platform/clog. fmt.Fprint*/Sprintf/Errorf stay allowed.
      forbid:
        - pattern: '^fmt\.Print(f|ln)?$'
          msg: "use widgets.* for CLI output or clog.* for logging, not fmt.Print*"
        - pattern: '^print(ln)?$'
          msg: "use widgets.* for CLI output or clog.* for logging, not the print/println builtins"
      analyze-types: true
    depguard:
      rules:
        main:
          list-mode: lax
          deny:
            - pkg: "io/ioutil"
              desc: "Deprecated: use io and os packages"
        platform:
          # strict: platform is an inert leaf, so deny every import by default
          # and allow only stdlib, its own subpackages, and its external deps.
          list-mode: strict
          files:
            - "**/internal/platform/**"
          allow:
            - "$gostd"
            - "aide/cli/internal/platform"
            - "gopkg.in/yaml.v3"
        persistence:
          # strict: persistence is an inert leaf (SQLite store only).
          list-mode: strict
          files:
            - "**/internal/persistence/**"
          allow:
            - "$gostd"
            - "aide/cli/internal/persistence"
            - "modernc.org/sqlite"
        security:
          list-mode: lax
          files:
            - "**/internal/security/**"
          deny:
            - pkg: "aide/cli/internal/persistence"
              desc: "security may depend on platform only"
            - pkg: "aide/cli/internal/runtime"
              desc: "security may depend on platform only"
            - pkg: "aide/cli/internal/setup"
              desc: "security may depend on platform only"
            - pkg: "aide/cli/internal/notification"
              desc: "security may depend on platform only"
            - pkg: "aide/cli/internal/agent"
              desc: "security may depend on platform only"
            - pkg: "aide/cli/internal/ui"
              desc: "security may depend on platform only"
        runtime:
          list-mode: lax
          files:
            - "**/internal/runtime/**"
          deny:
            - pkg: "aide/cli/internal/setup"
              desc: "runtime may depend on platform, persistence and security only"
            - pkg: "aide/cli/internal/notification"
              desc: "runtime may depend on platform, persistence and security only"
            - pkg: "aide/cli/internal/agent"
              desc: "runtime may depend on platform, persistence and security only"
            - pkg: "aide/cli/internal/ui"
              desc: "runtime may depend on platform, persistence and security only"
        setup:
          list-mode: lax
          files:
            - "**/internal/setup/**"
          deny:
            - pkg: "aide/cli/internal/notification"
              desc: "setup may depend on platform, persistence, security and runtime only"
            - pkg: "aide/cli/internal/agent"
              desc: "setup may depend on platform, persistence, security and runtime only"
            - pkg: "aide/cli/internal/ui"
              desc: "setup may depend on platform, persistence, security and runtime only"
        notification:
          list-mode: lax
          files:
            - "**/internal/notification/**"
          allow:
            - "aide/cli/internal/agent/events"
          deny:
            - pkg: "aide/cli/internal/persistence"
              desc: "notification may depend on agent/events (leaf) and platform only"
            - pkg: "aide/cli/internal/security"
              desc: "notification may depend on agent/events (leaf) and platform only"
            - pkg: "aide/cli/internal/runtime"
              desc: "notification may depend on agent/events (leaf) and platform only"
            - pkg: "aide/cli/internal/setup"
              desc: "notification may depend on agent/events (leaf) and platform only"
            - pkg: "aide/cli/internal/agent"
              desc: "notification may reach agent/events only, never agent core/api/tools"
            - pkg: "aide/cli/internal/ui"
              desc: "notification may depend on agent/events (leaf) and platform only"
        agent-events:
          # strict: agent/events is a leaf; it may reach platform only.
          list-mode: strict
          files:
            - "**/internal/agent/events/**"
          allow:
            - "$gostd"
            - "aide/cli/internal/agent/events"
            - "aide/cli/internal/platform"
        agent:
          list-mode: lax
          files:
            - "**/internal/agent/**"
          deny:
            - pkg: "aide/cli/internal/ui"
              desc: "agent must not depend on ui (presentation sits above agent)"
        ui:
          list-mode: lax
          files:
            - "**/internal/ui/**"
          deny:
            - pkg: "aide/cli/internal/agent"
              desc: "ui must not depend on agent, setup or notification"
            - pkg: "aide/cli/internal/setup"
              desc: "ui must not depend on agent, setup or notification"
            - pkg: "aide/cli/internal/notification"
              desc: "ui must not depend on agent, setup or notification"
    gosec:
      excludes:
        - G404
        - G202
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      enable-all-rules: false
      rules:
        - name: unused-parameter
        - name: early-return
        - name: empty-block
        - name: unreachable-code
        - name: unnecessary-stmt
    staticcheck:
      checks:
        - all
        - -ST1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - unparam
          - bodyclose
        path: _test\.go
      # The import DAG is enforced on production code only; tests may cross
      # concept boundaries and import internal/testutil (matches internal/archtest,
      # which also skips _test.go).
      - linters:
          - depguard
        path: _test\.go
      # Taint analysis on hardcoded system-keychain paths and the macOS
      # `security` CLI — inputs are constants, not attacker-controlled.
      - linters:
          - gosec
        path: internal/runtime/trust/trust_darwin\.go
        text: "G70[23]"
      # `go build` of a trusted, locally-resolved plugin source tree.
      - linters:
          - gosec
        path: internal/runtime/plugin/install\.go
        text: "G204"
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules

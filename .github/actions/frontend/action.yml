name: "Build embedded frontend"
description: "Install deps and build the aide UI into frontend/dist so go:embed has assets"
runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: cli/internal/agent/frontend/package-lock.json
    - shell: bash
      working-directory: cli/internal/agent/frontend
      run: npm ci && npm run build

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"
  GOFLAGS: "-mod=readonly"

jobs:
  build-vet-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Verify modules
        working-directory: cli
        run: go mod verify

      - name: Resolve packages
        id: pkgs
        working-directory: cli
        run: echo "list=$(go list ./... | grep -v '/cmd/aide-app' | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: cli
        run: go build ${{ steps.pkgs.outputs.list }}

      - name: Vet
        working-directory: cli
        run: go vet ${{ steps.pkgs.outputs.list }}

      - name: Test
        working-directory: cli
        run: go test ${{ steps.pkgs.outputs.list }}

  cross-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build $(go list ./... | grep -v '/cmd/aide-app')

  build-macos-app:
    runs-on: macos-14
    timeout-minutes: 20
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/frontend

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build desktop app
        working-directory: cli
        run: go build -tags production -o /dev/null ./cmd/aide-app

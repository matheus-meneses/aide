name: Release

on:
  push:
    tags:
      - "v*"
      - "sdk-v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CGO_ENABLED: "0"

jobs:
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: VERSION matches tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${REF_NAME#v}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION ($FILE_VERSION) matches tag ($TAG_VERSION)"

  release:
    needs: verify-version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/frontend

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BINARY="aide_${GOOS}_${GOARCH}${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.version=${REF_NAME} -X aide/cli/internal/agent.Version=${REF_NAME}" -o "../dist/${BINARY}" ./cmd/aide
          echo "BINARY=${BINARY}" >> "$GITHUB_ENV"

      - name: Checksum
        run: |
          cd dist
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/${{ env.BINARY }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: dist/${{ env.BINARY }}
          format: spdx-json
          output-file: dist/${{ env.BINARY }}.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: dist/${{ env.BINARY }}
          sbom-path: dist/${{ env.BINARY }}.spdx.json

      - name: Upload to Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/${{ env.BINARY }}
            dist/${{ env.BINARY }}.sha256
            dist/${{ env.BINARY }}.spdx.json

      - name: Upload install script
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: assets/deploy/install.sh

  release-macos-app:
    needs: verify-version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 40
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      CGO_ENABLED: "1"
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/frontend

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build app + DMG
        env:
          REF_NAME: ${{ github.ref_name }}
          MAKE_DMG: "1"
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          NOTARIZE_PROFILE: ${{ secrets.MACOS_NOTARIZE_PROFILE }}
        run: |
          VERSION="${REF_NAME#v}"
          VERSION="$VERSION" bash cli/cmd/aide-app/packaging/build-macos.sh
          DMG="cli/cmd/aide-app/packaging/bin/Aide-${VERSION}.dmg"
          shasum -a 256 "$DMG" > "$DMG.sha256"
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.DMG }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: cli/cmd/aide-app/packaging/bin/Aide.app/Contents/MacOS/Aide
          format: spdx-json
          output-file: ${{ env.DMG }}.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ env.DMG }}
          sbom-path: ${{ env.DMG }}.spdx.json

      - name: Upload to Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ${{ env.DMG }}
            ${{ env.DMG }}.sha256
            ${{ env.DMG }}.spdx.json

  update-homebrew-tap:
    needs: [release, release-macos-app]
    # Only stable tags update the rolling tap formula/cask. Prerelease tags
    # (e.g. v0.3.0-rc.1, which contain a hyphen) still publish their GitHub
    # release assets, but must not change what `brew install aide` resolves to.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p sums
          gh release download "$REF_NAME" --repo "${{ github.repository }}" --pattern '*.sha256' --dir sums

      - name: Render formula + cask
        env:
          REF_NAME: ${{ github.ref_name }}
        run: bash packaging/homebrew/render.sh "${REF_NAME#v}" sums rendered

      - name: Publish to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap publish" >&2
            exit 0
          fi
          VERSION="${REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/matheus-meneses/homebrew-aide.git" tap
          mkdir -p tap/Formula tap/Casks
          cp rendered/Formula/aide.rb tap/Formula/aide.rb
          cp rendered/Casks/aide-app.rb tap/Casks/aide-app.rb
          rm -f tap/Casks/aide.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A Formula Casks
          if git diff --cached --quiet; then
            echo "tap already up to date"
            exit 0
          fi
          git commit -m "aide ${VERSION}"
          git push origin HEAD

  release-notes:
    needs: [release, release-macos-app]
    # Curate the GitHub release body straight from CHANGELOG.md so notes are not
    # written by hand. Runs after the artifact jobs so it sets the body last.
    # Only stable tags (no hyphen) carry a dedicated changelog section.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract CHANGELOG section
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { insec = 1; next }
            insec && /^## \[/ { exit }
            insec { lines[++n] = $0 }
            END {
              s = 1; while (s <= n && lines[s] ~ /^[[:space:]]*$/) s++
              e = n; while (e >= 1 && lines[e] ~ /^[[:space:]]*$/) e--
              for (i = s; i <= e; i++) print lines[i]
            }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md section found for ${VERSION}; add a '## [${VERSION}]' heading"
            exit 1
          fi
          echo "----- release notes for ${VERSION} -----"
          cat release-notes.md

      - name: Publish release notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          prerelease: false
          body_path: release-notes.md

  publish-sdk:
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Stamp version from tag
        working-directory: sdk/python
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#sdk-v}"
          sed -i -E "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Test
        working-directory: sdk/python
        run: |
          python -m pip install --require-hashes -r requirements/ci-pip.txt
          python -m pip install --require-hashes -r requirements/ci-test.txt
          python -m pip install -e . --no-deps
          python -m pytest

      - name: Build
        working-directory: sdk/python
        run: |
          python -m pip install --require-hashes -r requirements/ci-build.txt
          python -m build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/python/dist
          attestations: true

name: Release

on:
  push:
    tags:
      - "v*"
      - "sdk-v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CGO_ENABLED: "0"

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/frontend

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          BINARY="aide_${GOOS}_${GOARCH}${{ matrix.suffix }}"
          go build -ldflags="-s -w -X main.version=${REF_NAME}" -o "../dist/${BINARY}" ./cmd/aide
          echo "BINARY=${BINARY}" >> "$GITHUB_ENV"

      - name: Checksum
        run: |
          cd dist
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/${{ env.BINARY }}

      - name: Upload to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/${{ env.BINARY }}
            dist/${{ env.BINARY }}.sha256

      - name: Upload install script
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: assets/deploy/install.sh

  publish-sdk:
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Stamp version from tag
        working-directory: sdk/python
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#sdk-v}"
          sed -i -E "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - name: Test
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
          python -m pytest

      - name: Build
        working-directory: sdk/python
        run: python -m pip install --upgrade build && python -m build

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: sdk/python/dist
          attestations: true
